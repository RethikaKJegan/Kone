input_image: assets/sample_elevator.jpg
mod_panel: assets/mod_panel.png
run_dir: runs/sample_run

preprocessing:
  enabled: true
  auto_correct: true
  max_roll_degrees: 12.0
  max_horizontal_shift_ratio: 0.035

input_validation:
  enabled: true
  fail_on_invalid: true
  require_elevator: true
  weights:
    perspective: 0.40
    visibility: 0.20
    sharpness: 0.10
    exposure: 0.10
    context: 0.10
    crop_scale: 0.10
  hard_fails:
    perspective_fail: 0.62
    perspective_review: 0.68
    visibility_min: 0.40
    sharpness_extreme_min: 0.05
    min_short_side: 420
  thresholds:
    pass: 0.65
    review: 0.55
  elevator_presence:
    min_score: 0.22

detection:
  enabled: true
  model_id: groundingdino_swint_ogc
  device: auto
  box_threshold: 0.25
  text_threshold: 0.20
  score_threshold: 0.25
  nms_iou: 0.65
  cross_label_nms_iou: 0.35
  enable_geometry_validation: true
  enable_depth_state_detection: true
  max_detections: 50
  min_box_area_ratio: 0.00005
  max_box_area_ratio: 0.90
  labels:
    - tall stainless steel elevator operating panel with round buttons
    - elevator call button panel
    - wheelchair button
    - floor_indicator_display
    - weight_limit_sign
    - accessibility control panel
    - elevator_door
    - elevator_cabin
    - threshold_plate
    - handrail
    - security_camera
    - emergency_phone

segmentation:
  enabled: true
  device: auto
  sam2_repo: ../sam2_src
  sam2_config: configs/sam2.1/sam2.1_hiera_l.yaml
  sam2_weights: ../weights/sam2.1_hiera_large.pt
  mask_dilate: 2
  fill_holes: true
  fallback_to_boxes: true

geometry:
  enabled: true
  depth_model_id: depth-anything/Depth-Anything-V2-Base-hf
  known_door_width_mm: 900
  max_plane_points: 4000
  ransac_iterations: 64
  min_plane_inlier_ratio: 0.60
  max_plane_residual: 0.05

removal:
  # These detections become the LaMa mask. Tune this list per job.
  target_keywords:
    - elevator panel
    - tall stainless steel elevator operating panel with round buttons
    - elevator call button panel
    - call button
    - speaker
  mask_padding_px: 10
  box_mask_padding_px: 2
  mask_dilate_iterations: 2
  cleanup_engine: auto       # auto, lama, wall_patch, or opencv
  wall_sample_margin_px: 55
  cleanup_feather_px: 2
  merge_nearby_control_modules: true
  control_module_merge_gap_px: 45
  control_module_horizontal_tolerance_px: 40

inpainting:
  engine: lama              # lama or opencv
  lama_repo: third_party/lama
  lama_model_dir: third_party/lama/big-lama
  device: auto
  fallback_to_opencv: false
  inpaint_crop_padding: 384
  blend_feather: 24
  lama_max_side: 1024

insertion:
  # Preferred placement source: detection, manual_box, or auto_left_wall.
  placement: detection
  target_keywords:
    - elevator panel
    - tall stainless steel elevator operating panel with round buttons
    - elevator call button panel
    - call button
    - speaker
  manual_box_xyxy: null     # Example: [95, 415, 140, 560]
  fallback_box_ratio_xyxy: [0.145, 0.39, 0.255, 0.61]
  adjacent_wall_min_margin_ratio: 0.055
  size_mode: fit_box         # fit_box, preserve_asset, or fixed_height
  fixed_height_px: null
  allow_upscale: false
  native_reference_width_px: 600
  native_reference_height_px: 800
  target_height_multiplier: 1.55
  scale_multiplier: 1.0
  top_shrink: 0.015
  side_skew: 0.008
  shadow_strength: 0.12
  texture_strength: 0.04
  max_shadow_radius_px: 18

perspective_mod_placement:
  # Runs after normal MOD insertion. In auto mode, wall-plane corners and the
  # MOD grid box are inferred from geometry and placement debug data.
  enabled: true
  auto: true
  base_image: null
  panel: null
  out_dir: null
  plane: null           # Example: "420,180 780,220 750,680 390,640"
  grid_cols: 8
  grid_rows: 12
  mod_box: null         # Example: "5.2,4.0 6.5,7.2"
  match_lighting: false

refinement:
  enabled: false
  model_id: runwayml/stable-diffusion-inpainting
  strength: 0.22
  guidance_scale: 6.5
  steps: 28
  prompt: ultra realistic commercial elevator wall panel, natural indoor lighting, subtle shadows, photorealistic
  negative_prompt: blurry, distorted, low quality, cartoon, cgi, warped geometry

video:
  enabled: true
  action: auto              # auto, open, or close
  cycle: true               # true = animate to the opposite state and back
  open_reference_image: null   # optional: image showing the elevator interior/cabin when doors are open
  closed_reference_image: null # optional: image showing the closed elevator doors/exterior
  fps: 30
  bitrate: 10000k
  no_audio: false
  refine_elevator_roi: true
  rectify_tilted_elevator: true
  max_wall_fraction_in_roi: 0.15
  preserve_static_wall_outside_roi: true

monitoring:
  interval_s: 1.0
